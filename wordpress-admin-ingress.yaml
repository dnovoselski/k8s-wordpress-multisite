# wordpress-admin-ingress.yaml
## ── WP-Admin IP Restriction ─────────────────────────────
## Restricts /wp-admin and /wp-login.php on the MAIN site only.
## Subdomain sites (*.yoursite.com) are NOT restricted -
## site owners need to manage their own sites.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wordpress-admin-ingress
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: "123.123.123.123"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - yoursite.com
    secretName: yourdomain-wildcard-tls ## put your secret wildcard-tls here. it will be different! kubectl get secret
  rules:
    - host: yoursite.com
      http:
        paths:
          - path: /wp-admin
            pathType: Prefix
            backend:
              service:
                name: wordpress-svc
                port:
                  number: 80
          - path: /wp-login.php
            pathType: Exact
            backend:
              service:
                name: wordpress-svc
                port:
                  number: 80

